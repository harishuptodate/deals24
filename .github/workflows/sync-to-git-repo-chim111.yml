name: Sync to GitHub B

on:
  push:
    branches:
      - "**"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror pushed branch to repo B
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git clone --depth 1 --branch "$BRANCH" https://github.com/${{ github.repository }} repo
          cd repo
          git remote add repo-b https://x-access-token:${{ secrets.GH_B_TOKEN }}@github.com/chimmani111/deals24.git
          git push repo-b "$BRANCH:$BRANCH" --force